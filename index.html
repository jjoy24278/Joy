<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Limited - Professional Predictions</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wdwGreen: '#5b8e55',
                        wdwDarkGreen: '#4a7945',
                        wdwBg: '#f4f6f4',
                        wdwCardBg: '#ffffff'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-wdwBg text-gray-800 min-h-screen font-sans">

    <!-- TOP NAVIGATION BAR -->
    <header class="bg-wdwGreen px-4 py-3 flex justify-between items-center shadow-md sticky top-0 z-50">
        <button onclick="toggleMenu()" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-white hover:bg-white/30 transition">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
        <div class="text-xl md:text-2xl font-extrabold tracking-wider text-white uppercase italic ml-2">
            FOOTBALL LIMITED
        </div>
        <div class="flex items-center gap-2">
            <button onclick="alert('Open Sign In Modal')" class="text-white text-xs md:text-sm font-bold bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg border border-white/20 transition">Sign In</button>
            <button onclick="alert('Open Register Modal')" class="bg-white text-wdwGreen text-xs md:text-sm font-extrabold px-3 py-1.5 rounded-lg shadow hover:bg-gray-100 transition">Register</button>
        </div>
    </header>

    <!-- ACCORDION MENU -->
    <nav id="mobile-menu" class="hidden bg-wdwDarkGreen text-white divide-y divide-green-700/50">
        <a href="#" class="flex items-center px-6 py-3.5 text-base font-semibold hover:bg-green-800 transition gap-4"><i class="fa-solid fa-house w-5 text-center"></i><span>Home</span></a>
        <a href="#" class="flex items-center px-6 py-3.5 text-base font-semibold hover:bg-green-800 transition gap-4"><i class="fa-solid fa-chart-simple w-5 text-center"></i><span>Statistics</span></a>
    </nav>

    <!-- HERO SECTION -->
    <div class="bg-gradient-to-r from-green-800 to-wdwGreen text-white px-4 py-8 text-center shadow-sm">
        <h1 class="text-2xl md:text-4xl font-extrabold mb-3">Free Football Predictions & Statistics</h1>
        <p class="text-green-100 text-sm max-w-2xl mx-auto leading-relaxed">
            We have a team of 30+ dedicated football analysts who carefully review matches every day using statistics, team form, player performance, and tactical research.
        </p>
    </div>

    <!-- MAIN CONTENT -->
    <main class="max-w-4xl mx-auto px-4 py-6 space-y-6">

        <!-- FILTER BUTTONS -->
        <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-none snap-x">
            <button class="bg-gray-200 text-gray-700 hover:bg-wdwGreen hover:text-white px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap snap-start"><i class="fa-solid fa-square-poll-horizontal mr-1"></i> Results</button>
            <button class="bg-wdwGreen text-white px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap snap-start"><i class="fa-solid fa-calendar-day mr-1"></i> Today</button>
            <button class="bg-gray-200 text-gray-700 hover:bg-wdwGreen hover:text-white px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap snap-start"><i class="fa-solid fa-gift mr-1"></i> Free</button>
            <button class="bg-amber-500 text-white hover:bg-amber-600 px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap snap-start flex items-center gap-1"><i class="fa-solid fa-crown"></i> VIP Match</button>
        </div>

        <!-- PREDICTIONS CARD -->
        <div class="bg-wdwCardBg rounded-2xl shadow-sm overflow-hidden border border-gray-200">
            <div class="bg-gray-100 px-4 py-3.5 border-b border-gray-200 flex justify-between items-center">
                <h3 class="font-bold text-gray-700 text-sm uppercase tracking-wide flex items-center gap-2"><i class="fa-solid fa-star text-amber-500"></i> Top Featured Predictions</h3>
                <span class="text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded-full font-bold">Live Data</span>
            </div>

            <!-- DYNAMIC MATCH CONTAINER -->
            <div id="match-container" class="divide-y divide-gray-100">
                <div class="p-8 text-center text-gray-500 text-sm"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Loading matches...</div>
            </div>
        </div>

    </main>

    <script>
        function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }

        // আপনার প্রজেক্টের লাইভ ইনফরমেশন
        const apiBase = 'https://coaaixztzeqxeheugrqu.supabase.co/rest/v1/Match?select=*';
        const SUPABASE_ANON_KEY = 'Sb_publishable_Zm38ZjQbCGXE2r7eSKxfGA_lHHiwWuc';

        fetch(apiBase, {
            method: 'GET',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
        })
        .then(res => res.json())
        .then(data => {
            let html = '';
            
            if(!data || data.length === 0) {
                document.getElementById('match-container').innerHTML = '<div class="p-8 text-center text-gray-500 text-sm">No matches found. Add rows in your Supabase Match table!</div>';
                return;
            }

            // আইডি অনুযায়ী সর্ট করে নতুন ম্যাচগুলো ওপরে দেখাবে
            data.sort((a, b) => b.id - a.id);

            data.forEach(match => {
                html += `
                <div class="p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                    <div class="flex-1">
                        <div class="text-xs text-gray-400 font-semibold uppercase tracking-wider mb-1">🏆 ${match.league || ''}</div>
                        <div class="font-bold text-gray-800 text-base flex items-center gap-2">
                            <span>${match.home_team || ''}</span> <span class="text-gray-400 font-normal text-xs">vs</span> <span>${match.away_team || ''}</span>
                        </div>
                        <div class="text-xs text-gray-500 mt-0.5"><i class="fa-regular fa-clock mr-1"></i> ${match.match_time || ''}</div>
                    </div>
                    <div class="flex items-center gap-2 w-full sm:w-auto justify-between sm:justify-end">
                        <div class="flex gap-1 text-center font-bold text-xs">
                            <div class="bg-green-50 text-green-700 px-2.5 py-1.5 rounded-lg border border-green-100"><span class="block text-[10px] text-gray-400 font-medium">Home</span> ${match.home_pct || '0%'}</div>
                            <div class="bg-gray-50 text-gray-600 px-2.5 py-1.5 rounded-lg border border-gray-100"><span class="block text-[10px] text-gray-400 font-medium">Draw</span> ${match.draw_pct || '0%'}</div>
                            <div class="bg-blue-50 text-blue-700 px-2.5 py-1.5 rounded-lg border border-blue-100"><span class="block text-[10px] text-gray-400 font-medium">Away</span> ${match.away_pct || '0%'}</div>
                        </div>
                        <div class="bg-wdwGreen text-white px-3 py-2 rounded-xl text-center font-extrabold text-sm min-w-[90px] shadow-sm">
                            <span class="block text-[9px] uppercase tracking-wider text-green-100 font-normal">TIP</span> ${match.tip || 'N/A'}
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('match-container').innerHTML = html;
        })
        .catch(err => {
            console.error(err);
            document.getElementById('match-container').innerHTML = '<div class="p-4 text-center text-red-500 text-sm">Error connecting to Supabase Database.</div>';
        });
    </script>
</body>
</html>
