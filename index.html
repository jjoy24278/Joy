<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Limited</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-xl font-bold mb-4">Matches</h1>
        <div id="match-container">Loading...</div>
    </div>

    <script>
        const API_URL = 'https://coaaixztzeqxeheugrqu.supabase.co/rest/v1/Match?select=*';
        const API_KEY = 'Sb_publishable_Zm38ZjQbCGXE2r7eSKxfGA_lHHiwWuc';

        fetch(API_URL, {
            headers: {
                'apikey': API_KEY,
                'Authorization': 'Bearer ' + API_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            }
        })
        .then(res => res.json())
        .then(data => {
            console.log(data); // ব্রাউজার কনসোলে এরর চেক করার জন্য
            document.getElementById('match-container').innerHTML = JSON.stringify(data);
        })
        .catch(err => {
            document.getElementById('match-container').innerText = 'Error: ' + err.message;
        });
    </script>
</body>
</html>
