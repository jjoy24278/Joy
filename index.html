<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Limited - Live Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-xl font-bold mb-4">Matches</h1>
        <div id="match-container">Connecting...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://coaaixztzeqxeheugrqu.supabase.co';
        // আপনার আসল JWT Key
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvYWFpeHp0emVxeGVoZXVncnF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MzY0ODIsImV4cCI6MjA5OTQxMjQ4Mn0.5Tr8VrnyA-BtiXbUoKZFiz100zgSD463HC_Shgw8pt4';

        fetch(`${SUPABASE_URL}/rest/v1/Match?select=*`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json'
            }
        })
        .then(res => res.json())
        .then(data => {
            // ডেটা পেলে তা স্ক্রিনে দেখাবে
            document.getElementById('match-container').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        })
        .catch(err => {
            document.getElementById('match-container').innerText = 'Error: ' + err.message;
        });
    </script>
</body>
</html>
